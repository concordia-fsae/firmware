name: Formatting

on:
  pull_request:
    branches: [master, comp*]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install formatters
        run: |
          python -m pip install --upgrade pip prek
      - name: Run pre-commit
        run: |
          if ! prek run --all-files --show-diff-on-failure --color always; then
            echo ""
            echo "Formatting failed."
            echo "Run this locally to fix or reproduce:"
            echo "  pre-commit run --all-files --show-diff-on-failure --color always"
            exit 1
          fi
