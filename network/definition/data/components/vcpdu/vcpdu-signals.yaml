signals:
  overvoltage:
    description: Overvoltage fault
    discreteValues: faultStatus
  lowVoltage:
    description: Low voltage fault
    discreteValues: faultStatus
  batteryNOK:
    description: Undervoltage fault
    discreteValues: faultStatus
  safetyNOK:
    description: Safety circuit brownout fault
    discreteValues: faultStatus
  contactsOpenInRun:
    description: Contacts opened while in run mode
    discreteValues: faultStatus
  imuOverrun:
    description: VCPDU IMU buffern overrun
    discreteValues: faultStatus
  imuError:
    description: VCPDU IMU error
    discreteValues: faultStatus
  imuSna:
    description: VCPDU IMU is not available
    discreteValues: faultStatus
  imuFsmInitFailure:
    description: VCPDU IMU is not available
    discreteValues: faultStatus
  imuUncalibrated:
    description: IMU is uncalibrated
    discreteValues: faultStatus
  imuInvalid:
    description: IMU data is not reliable
    discreteValues: faultStatus
  faulted5vCritical:
    description: 5V critical external power rail faulted
    discreteValues: faultStatus
  faulted5vExt:
    description: 5V external power rail faulted
    discreteValues: faultStatus
  imuSelfTestFailed:
    description: IMU self test failed
    discreteValues: faultStatus
  imuSelfTesting:
    description: IMU self test is in progress
    discreteValues: digitalStatus

  crashSensorState:
    description: Crash sensor state
    discreteValues: crashSensorState

  crashImplausibility:
    description: NVM vehicle state is in TS_RUN on boot
    discreteValues: faultStatus
  imuYawCalibrating:
    description: IMU yaw calibration is in progress
    discreteValues: faultStatus
  imuYawCalibrationFailed:
    description: IMU yaw calibration request failed
    discreteValues: faultStatus

  vehicleState:
    description: "Current state of the vehicle"
    discreteValues: vehicleState

  pumpHsdState:
    description: "Current state of Pump HSD"
    discreteValues: hsdState

  fanHsdState:
    description: "Current state of Fan HSD"
    discreteValues: hsdState

  pumpDutyCycle:
    description: "Pump HSD duty cycle"
    template: percentage

  fanDutyCycle:
    description: "Fan HSD duty cycle"
    template: percentage

  bms1HsdState:
    description: "Current state of BMSW1 HSD"
    discreteValues: hsdState

  shutdownHsdState:
    description: "Current state of SHUTDOWN HSD"
    discreteValues: hsdState

  bms2HsdState:
    description: "Current state of BMSW2 HSD"
    discreteValues: hsdState

  accumHsdState:
    description: "Current state of ACCUM HSD"
    discreteValues: hsdState

  bms3HsdState:
    description: "Current state of BMSW3 HSD"
    discreteValues: hsdState

  sensorHsdState:
    description: "Current state of SENSOR HSD"
    discreteValues: hsdState

  vc1HsdState:
    description: "Current state of VC1 HSD"
    discreteValues: hsdState

  vc2HsdState:
    description: "Current state of VC2 HSD"
    discreteValues: hsdState

  mcHsdState:
    description: "Current state of MC HSD"
    discreteValues: hsdState

  vcu3HsdState:
    description: "Current state of VCU3 HSD"
    discreteValues: hsdState

  hveHsdState:
    description: "Current state of HVE HSD"
    discreteValues: hsdState

  cockpitHsdState:
    description: "Current state of COCKPIT HSD"
    discreteValues: hsdState

  spareHsdState:
    description: "Current state of SPARE HSD"
    discreteValues: hsdState

  bms4HsdState:
    description: "Current state of BMSW4 HSD"
    discreteValues: hsdState

  vcu1HsdState:
    description: "Current state of VCU1 HSD"
    discreteValues: hsdState

  vcu2HsdState:
    description: "Current state of VCU2 HSD"
    discreteValues: hsdState

  bms5HsdState:
    description: "Current state of BMSW5 HSD"
    discreteValues: hsdState

  bms6HsdState:
    description: "Current state of BMSW6 HSD"
    discreteValues: hsdState

  glvVoltage:
    unit: 'V'
    description: GLV Battery Voltage
    nativeRepresentation:
      bitWidth: 8
      range:
        min: 0
        max: 16
    continuous: true

  glvCurrent:
    unit: 'A'
    description: GLV Battery Current
    nativeRepresentation:
      bitWidth: 10
      range:
        min: 0
        max: 50
    continuous: true

  pdu5vVoltage:
    unit: 'V'
    description: PDU 5V Rail
    nativeRepresentation:
      bitWidth: 8
      range:
        min: 0
        max: 6
    continuous: true
