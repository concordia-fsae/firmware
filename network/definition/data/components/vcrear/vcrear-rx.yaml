forwarding:
  - sourceBus: ass
    destBus: veh
    policy: bridged
    bridgedMessages:
      - PM100DX_criticalData
      - PM100DX_temps1
      - PM100DX_temps3AndTorqueShudder
      - PM100DX_motorPositionInfo
      - PM100DX_torqueAndTimerInfo
      - PM100DX_currentInfo
      - PM100DX_faults
      - PM100DX_eepromResponse
  - sourceBus: veh
    destBus: ass
    policy: bridged
    bridgedMessages:
      - BMSB_currentLimit
      - TOOLING_mcEepromCommand

messages:
  UDSCLIENT_vcrearUdsRequest:
    unrecorded: true
  VCFRONT_pedalPosition:
    sourceBuses: veh
  VCFRONT_torqueManager:
    sourceBuses: veh
  BMSB_ioStatus:
    sourceBuses: veh
  PM100DX_criticalData:
    sourceBuses: ass
  BMSB_currentLimit:
    sourceBuses: veh
  PM100DX_temps1:
    sourceBuses: ass
  PM100DX_temps3AndTorqueShudder:
    sourceBuses: ass
  PM100DX_motorPositionInfo:
    sourceBuses: ass
  PM100DX_torqueAndTimerInfo:
    sourceBuses: ass
  PM100DX_currentInfo:
    sourceBuses: ass
  PM100DX_internalStates:
    sourceBuses: ass
  UDSCLIENT_bmsbUdsRequest:
    sourceBuses: veh
    unrecorded: true
  PM100DX_faults:
    sourceBuses: ass
  PM100DX_eepromResponse:
    sourceBuses: ass
    unrecorded: true
  TOOLING_mcEepromCommand:
    sourceBuses: veh
    unrecorded: true

signals:
  VCFRONT_gear:
    sourceBuses: veh
  VCFRONT_raceMode:
    sourceBuses: veh
  VCPDU_vehicleState:
    sourceBuses: veh
  BMSB_packContactorState:
    sourceBuses: veh
  VCFRONT_axleSpeedFront:
    sourceBuses: veh
  VCFRONT_wheelSpeedFL:
    sourceBuses: veh
  VCFRONT_wheelSpeedFR:
    sourceBuses: veh
  VCPDU_safetyReset:
    sourceBuses: veh
  VCFRONT_vehicleSpeed:
    sourceBuses: veh
