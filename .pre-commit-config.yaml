exclude: ^buck-out/

repos:
  # - repo: https://github.com/pocc/pre-commit-hooks
  #   rev: v1.3.5
  #   hooks:
  #     - id: uncrustify
  #       args: [-c, uncrustify.cfg, --no-backup]
  #       files: \.(c|h|cc|cpp|cxx|hh|hpp|hxx)$
  - repo: https://github.com/google/yamlfmt
    rev: v0.13.0
    hooks:
      - id: yamlfmt
        args: [-conf, yamlfmt.yaml]
        files: \.(yaml|yml)$
  # - repo: https://github.com/doublify/pre-commit-rust
  #   rev: v1.0
  #   hooks:
  #     - id: fmt
  #       files: \.rs$
  #       exclude: ^tools/yamcan/srcs/rust/lib\.rs$
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        files: \.toml$
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        files: \.sh$
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        files: \.md$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff-format
        files: \.py$
