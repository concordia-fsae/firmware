config:
  prefix: nvm
  description: General definitions for non voltaile memory
defs:
  lib_enabled:
  block_size:
  task:
    requires:
      nvm_lib_enabled:
    restricts:
      nvm_swi:
  swi:
    requires:
      nvm_lib_enabled:
    restricts:
      nvm_thread:
  flash_backed:
    requires:
      - nvm_lib_enabled
      - nvm_block_size
